name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Cancel in-progress runs when a newer commit lands on the same ref \u2014
# saves GitHub Actions minutes (tracked by P5.7 usage monitor).
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install engine package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: |
          pytest engine/tests/ -v --tb=short

      - name: Verify migration schema parity
        # Apply migrations/0001_initial.sql to a fresh DB and confirm
        # PRAGMA table_info matches the v1.5 surface area.
        run: |
          python -c "
          import sqlite3, tempfile, os
          from pathlib import Path
          sql = Path('engine/migrations/0001_initial.sql').read_text()
          fd, tmp = tempfile.mkstemp(suffix='.db'); os.close(fd)
          con = sqlite3.connect(tmp); con.executescript(sql); con.commit()
          counts = {t: len(list(con.execute(f'PRAGMA table_info({t})')))
                    for t in ('daily_runs', 'stochastic_log', 'pipeline_runs')}
          assert counts == {'daily_runs': 98, 'stochastic_log': 43, 'pipeline_runs': 10}, counts
          os.unlink(tmp)
          print('migration schema parity OK')
          "
